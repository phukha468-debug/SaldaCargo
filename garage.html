<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Макет: Ввод времени механиком</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">

  <!-- Контейнер мобильного приложения -->
  <div class="relative w-full max-w-sm h-[800px] bg-slate-50 overflow-hidden shadow-2xl border border-slate-200 rounded-3xl flex flex-col">
    
    <!-- Шапка наряда -->
    <div class="bg-white p-4 border-b border-slate-200">
      <div class="flex items-center justify-between mb-2">
        <h1 class="text-xl font-black text-slate-900">Наряд #1042</h1>
        <span class="text-[10px] font-black uppercase px-3 py-1 rounded-full bg-orange-100 text-orange-700">В работе</span>
      </div>
      <p class="text-lg font-bold text-slate-700">ГАЗель NEXT</p>
      <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">А 123 АА 196</p>
    </div>

    <!-- Список работ (задний фон) -->
    <div class="flex-1 p-4 space-y-3 overflow-y-auto pb-32">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Работы (2)</h2>
        <button class="bg-orange-100 text-orange-700 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest">+ Добавить работу</button>
      </div>

      <!-- Выполненная работа -->
      <div class="bg-white rounded-xl border border-slate-100 p-4 opacity-50">
        <div class="flex justify-between items-start mb-2">
          <div>
            <p class="text-sm font-black text-slate-900">Замена масла в ДВС</p>
            <p class="text-[10px] font-bold text-slate-400 uppercase mt-1">Потрачено: 45 мин</p>
          </div>
          <span class="text-[9px] font-black uppercase px-2 py-1 rounded-full bg-green-100 text-green-700">✓ Выполнено</span>
        </div>
      </div>

      <!-- Работа в процессе завершения -->
      <div class="bg-white rounded-xl border-2 border-orange-500 shadow-lg p-4">
        <div class="flex justify-between items-start mb-2">
          <div>
            <p class="text-sm font-black text-slate-900 leading-tight">Замена тормозных колодок (перед)</p>
            <p class="text-[10px] font-bold text-slate-400 uppercase mt-1">Норма: 60 мин</p>
          </div>
          <span class="text-[9px] font-black uppercase px-2 py-1 rounded-full bg-orange-600 text-white animate-pulse">В работе</span>
        </div>
        <div class="mt-3">
          <!-- Кнопка, которую нажимает механик -->
          <button class="w-full bg-green-600 text-white rounded-lg py-3 text-xs font-black uppercase tracking-widest active:scale-95 transition-transform" onclick="document.getElementById('bottom-sheet').classList.remove('translate-y-full')">
            ✓ Указать время и завершить
          </button>
        </div>
      </div>
    </div>

    <!-- Фиксированная кнопка внизу "Закрыть наряд" -->
    <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-4 pt-3 pb-6">
      <button class="w-full bg-zinc-900 text-white rounded-xl py-4 text-sm font-black uppercase tracking-widest disabled:opacity-50" disabled>
        Отправить на утверждение
      </button>
    </div>

    <!-- Модальное окно (BottomSheet) Ввода времени -->
    <div id="bottom-sheet" class="absolute inset-0 z-50 flex flex-col justify-end transition-transform duration-300 translate-y-full">
      <!-- Затемнение фона -->
      <div class="absolute inset-0 bg-black/50" onclick="document.getElementById('bottom-sheet').classList.add('translate-y-full')"></div>
      
      <!-- Сама шторка -->
      <div class="relative bg-white rounded-t-3xl pt-2 pb-6 px-4 shadow-2xl flex flex-col">
        <!-- Полоска сверху -->
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-5"></div>
        
        <h3 class="text-lg font-black text-slate-900 text-center mb-1">Завершение работы</h3>
        <p class="text-sm text-slate-500 text-center mb-6">Замена тормозных колодок (перед)</p>

        <div class="bg-orange-50 border border-orange-100 rounded-2xl p-4 mb-6">
          <label class="block text-[10px] font-black text-orange-800 uppercase tracking-widest mb-3 text-center">Сколько времени вы потратили?</label>
          <div class="flex items-center justify-center gap-4">
            
            <div class="flex flex-col items-center">
              <input type="number" value="1" min="0" class="w-20 text-center bg-white border-2 border-orange-200 rounded-xl py-3 text-2xl font-black focus:outline-none focus:border-orange-500 transition-colors">
              <span class="text-xs font-bold text-orange-600 uppercase mt-2">Часов</span>
            </div>
            
            <span class="text-2xl font-black text-orange-300 mb-6">:</span>

            <div class="flex flex-col items-center">
              <input type="number" value="15" min="0" max="59" class="w-20 text-center bg-white border-2 border-orange-200 rounded-xl py-3 text-2xl font-black focus:outline-none focus:border-orange-500 transition-colors">
              <span class="text-xs font-bold text-orange-600 uppercase mt-2">Минут</span>
            </div>

          </div>
        </div>

        <!-- Быстрые кнопки -->
        <div class="flex gap-2 mb-6 justify-center">
          <button class="bg-slate-100 text-slate-600 text-xs font-black px-4 py-2 rounded-lg active:bg-slate-200">+ 30 мин</button>
          <button class="bg-slate-100 text-slate-600 text-xs font-black px-4 py-2 rounded-lg active:bg-slate-200">+ 1 час</button>
          <button class="bg-slate-100 text-slate-600 text-xs font-black px-4 py-2 rounded-lg active:bg-slate-200">По норме (60м)</button>
        </div>

        <button class="w-full bg-green-600 text-white rounded-xl py-4 text-sm font-black uppercase tracking-widest active:scale-95 transition-transform" onclick="document.getElementById('bottom-sheet').classList.add('translate-y-full')">
          ✓ Сохранить и завершить
        </button>
        <button class="w-full mt-2 bg-transparent text-slate-400 rounded-xl py-3 text-xs font-black uppercase tracking-widest" onclick="document.getElementById('bottom-sheet').classList.add('translate-y-full')">
          Отмена
        </button>
      </div>
    </div>
  </div>

</body>
</html>
