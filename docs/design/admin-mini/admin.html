<img alt="User Profile Avatar" class="w-full h-full object-cover" data-alt="Close-up portrait of a professional man in industrial setting, sharp focus, natural lighting, wearing a hardhat" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBicabvVji33VfXV096ut1ZitDAftQ1dnl8t72XWP7kTA0F8pMSAMNkf1w-9zy0I_nCj6AodGHoRq8Y9vwd_oy8oc0H7SsFP1TclbbnfK1liKv_kDwrd-qssuT8IVg4g4Oh2Y2n4_8hqPAkZr7z4J8fSeFXYfpw604eNdtkkWXxDSREjf5DW8IWo1yGcotgy7hG34oeJm0Ad3ZjKMO4w_4Po2-CMAfOUJ-CrYx6KOv2VL6sSBwv47DIcADs8PVVbA6Znifmnr8TeOA" style="">

<h1 class="text-xl font-black text-zinc-900 dark:text-zinc-100 font-['Inter'] font-bold uppercase tracking-wider" style="">SaldaCargo</h1>
</div>
<button class="w-12 h-12 flex items-center justify-center rounded-full text-zinc-500 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors active:opacity-80" style="">
<span class="material-symbols-outlined" style="font-variation-settings: &quot;FILL&quot; 0;">signal_cellular_4_bar</span>
</button>
</header>
<main class="px-margin-mobile md:px-margin-tablet py-unit max-w-3xl mx-auto flex flex-col gap-unit">
<!-- Summary Card (Bento Style) -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-lg overflow-hidden flex flex-col mb-2">
<div class="bg-surface-container-high px-4 py-3 border-b border-outline-variant">
<h2 class="font-h2 text-h2 text-on-surface" style="">Сводка</h2>
</div>
<div class="p-4 flex flex-col gap-3">
<div class="flex justify-between items-center border-b border-surface-variant pb-2">
<span class="font-body-md text-body-md text-on-surface-variant" style="">Выручка</span>
<span class="font-h2 text-h2 text-on-surface font-bold" style="">245,000 ₽</span>
</div>
<div class="flex justify-between items-center border-b border-surface-variant pb-2">
<span class="font-body-md text-body-md text-on-surface-variant" style="">ФОТ</span>
<span class="font-h2 text-h2 text-on-surface font-bold" style="">82,400 ₽</span>
</div>
<div class="flex justify-between items-center border-b border-surface-variant pb-2 relative">
<div class="absolute left-[-16px] top-1/2 -translate-y-1/2 w-1 h-full bg-primary"></div>
<span class="font-body-md text-body-md text-on-surface-variant" style="">Прибыль</span>
<span class="font-h1 text-h1 text-primary font-black" style="">162,600 ₽</span>
</div>
<div class="flex justify-between items-center pt-1">
<span class="font-body-md text-body-md text-on-surface-variant" style="">Машин в работе</span>
<div class="flex items-center gap-2">
<div class="w-24 h-2 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-secondary w-[84%]"></div>
</div>
<span class="font-label-md text-label-md text-on-surface" style="">42/50</span>
</div>
</div>
</div>
</section>
<!-- Alerts -->
<section class="flex flex-col gap-2 mb-2">
<!-- Alert 1: Red -->
<div class="bg-error-container border border-error rounded-lg p-4 flex items-start gap-3 relative overflow-hidden min-h-[64px]">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-error"></div>
<span class="material-symbols-outlined text-on-error-container" style="font-variation-settings: &quot;FILL&quot; 1;">warning</span>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-error-container font-bold" style="">Требуется внимание</span>
<span class="font-body-md text-body-md text-on-error-container" style="">3 рейса ждут ревью</span>
</div>
</div>
<!-- Alert 2: Yellow (Using Outline Variant as a proxy for caution in this theme) -->
<div class="bg-[#FFF8E1] border border-[#FFC107] rounded-lg p-4 flex items-start gap-3 relative overflow-hidden min-h-[64px]">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-[#FFC107]"></div>
<span class="material-symbols-outlined text-[#FF8F00]" style="font-variation-settings: &quot;FILL&quot; 1;">notifications_active</span>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-[#FF8F00] font-bold" style="">Лимит кассы</span>
<span class="font-body-md text-body-md text-[#FF8F00]" style="">Касса &gt; 500,000 ₽</span>
</div>
</div>
</section>
<!-- Action Grid -->
<section class="grid grid-cols-2 gap-unit">
<!-- Action 1 -->
<button class="bg-primary hover:bg-surface-tint active:opacity-80 transition-colors rounded-lg flex flex-col items-center justify-center p-4 min-h-[120px] text-on-primary shadow-sm" style="">

<span class="font-label-md text-label-md text-center font-bold" style="">Забрать выручку</span>
</button>
<!-- Action 2 -->
<button class="bg-tertiary hover:bg-secondary active:opacity-80 transition-colors rounded-lg flex flex-col items-center justify-center p-4 min-h-[120px] text-on-tertiary shadow-sm" style="">
<span class="material-symbols-outlined text-[32px] mb-2" style="font-variation-settings: &quot;FILL&quot; 0;">add_circle</span>
<span class="font-label-md text-label-md text-center font-bold" style="">Приход</span>
</button>
<!-- Action 3 -->
<button class="bg-surface-container-highest border-2 border-outline-variant hover:bg-surface-dim active:opacity-80 transition-colors rounded-lg flex flex-col items-center justify-center p-4 min-h-[120px] text-on-surface shadow-sm" style="">
<span class="material-symbols-outlined text-[32px] mb-2 text-on-surface-variant" style="font-variation-settings: &quot;FILL&quot; 0;">do_not_disturb_on</span>
<span class="font-label-md text-label-md text-center font-bold" style="">Расход</span>
</button>

<span class="material-symbols-outlined text-[32px] mb-2 text-on-surface-variant" style="font-variation-settings: &quot;FILL&quot; 0;">swap_horiz</span>
<span class="font-label-md text-label-md text-center font-bold" style="">Перевод</span>
</button>
</section>

<button class="flex flex-col items-center justify-center text-orange-600 dark:text-orange-500 border-t-4 border-orange-600 pt-1 hover:text-zinc-900 dark:hover:text-zinc-100 active:scale-95 transition-transform w-full h-full" style="">
<span class="material-symbols-outlined" style="font-variation-settings: &quot;FILL&quot; 1;">home</span>
<span class="font-['Inter'] font-bold text-[12px] mt-1" style="">Домой<br></span>

<span class="material-symbols-outlined" style="font-variation-settings: &quot;FILL&quot; 0;">account_balance</span>
